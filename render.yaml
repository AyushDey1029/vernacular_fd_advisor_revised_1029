services:
  # 1. Backend (Web Service)
  - type: web
    name: vernacular-fd-advisor-api
    env: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: node app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: GROQ_API_KEY
        sync: false # You will enter this in the Render dashboard
      - key: CLIENT_ORIGIN
        sync: false # You will enter your frontend URL here later

  # 2. Frontend (Static Site)
  - type: static
    name: vernacular-fd-advisor-client
    env: static
    rootDir: client
    publishDir: .
