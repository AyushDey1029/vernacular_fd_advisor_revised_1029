services:
  - type: web
    name: vernacular-fd-advisor-api
    env: node
    plan: free # Forces Render to use the free tier
    rootDir: server
    buildCommand: npm install
    startCommand: node app.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: GROQ_API_KEY
        sync: false # You will enter this securely in the Render dashboard later
      - key: CLIENT_ORIGIN
        sync: false # You will enter your Netlify URL here later
