<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vernacular FD Advisor — Multilingual Fixed Deposit Chatbot</title>
  <meta name="description" content="A multilingual AI-powered Fixed Deposit advisor. Ask about FDs, calculate returns, and book deposits in English, Hindi, Tamil, Telugu, or Bengali." />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ═══════════════════════════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════════════════════════ */
    :root {
      --bg-app:       #0d0f1a;
      --bg-sidebar:   #111320;
      --bg-surface:   #161928;
      --bg-card:      #1e2235;
      --bg-input:     #252a3d;
      --bg-user-msg:  linear-gradient(135deg, #6c47ff, #a855f7);
      --bg-bot-msg:   #1e2235;

      --accent-1:     #6c47ff;
      --accent-2:     #a855f7;
      --accent-3:     #38bdf8;
      --accent-green: #22d3a0;
      --accent-gold:  #f59e0b;

      --text-primary:   #e8eaf6;
      --text-secondary: #8892b0;
      --text-muted:     #4a5580;

      --border:  rgba(108, 71, 255, 0.2);
      --shadow:  0 8px 32px rgba(0, 0, 0, 0.4);
      --radius:  16px;
      --radius-sm: 8px;

      --font-main: 'Inter', 'Noto Sans Devanagari', sans-serif;
    }

    /* ═══════════════════════════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: var(--font-main);
      background: var(--bg-app);
      color: var(--text-primary);
      overflow: hidden;
    }

    /* Animated gradient background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 20% 10%, rgba(108, 71, 255, 0.12) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 80% 90%, rgba(168, 85, 247, 0.10) 0%, transparent 60%),
        radial-gradient(ellipse 30% 30% at 50% 50%, rgba(56, 189, 248, 0.05) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    #app {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      align-items: stretch;
      height: 100vh;
      padding: 20px;
    }

    /* ═══════════════════════════════════════════════════════════
       CHAT CONTAINER
    ═══════════════════════════════════════════════════════════ */
    .chat-container {
      display: flex;
      flex-direction: column;
      width: 100%;
      max-width: 780px;
      height: 100%;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow), 0 0 0 1px rgba(108, 71, 255, 0.08);
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════════════════════ */
    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      background: var(--bg-sidebar);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .bot-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 16px rgba(108, 71, 255, 0.5);
      flex-shrink: 0;
      animation: pulse-avatar 3s ease-in-out infinite;
    }

    @keyframes pulse-avatar {
      0%, 100% { box-shadow: 0 0 16px rgba(108, 71, 255, 0.5); }
      50%       { box-shadow: 0 0 28px rgba(168, 85, 247, 0.7); }
    }

    .header-title {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-subtitle {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .header-badge {
      font-size: 12px;
      color: var(--accent-green);
      background: rgba(34, 211, 160, 0.1);
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid rgba(34, 211, 160, 0.25);
    }

    /* ═══════════════════════════════════════════════════════════
       MESSAGES LIST
    ═══════════════════════════════════════════════════════════ */
    .messages-list {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      scroll-behavior: smooth;
    }

    /* Custom scrollbar */
    .messages-list::-webkit-scrollbar { width: 4px; }
    .messages-list::-webkit-scrollbar-track { background: transparent; }
    .messages-list::-webkit-scrollbar-thumb {
      background: rgba(108, 71, 255, 0.3);
      border-radius: 4px;
    }

    /* ── Message Wrappers ── */
    .message-wrapper {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: msg-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes msg-in {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)   scale(1);    }
    }

    .message-wrapper.user {
      flex-direction: row-reverse;
    }

    .message-wrapper.bot {
      flex-direction: row;
    }

    .bot-msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      margin-bottom: 18px;
    }

    /* ── Message Bubbles ── */
    .message-bubble {
      max-width: 72%;
      padding: 12px 16px;
      border-radius: 18px;
      line-height: 1.6;
      font-size: 14.5px;
      word-break: break-word;
    }

    .message-bubble.user {
      background: var(--bg-user-msg);
      color: #fff;
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 16px rgba(108, 71, 255, 0.35);
    }

    .message-bubble.bot {
      background: var(--bg-bot-msg);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .message-bubble strong {
      color: var(--accent-2);
      font-weight: 600;
    }

    .message-time {
      font-size: 10px;
      color: var(--text-muted);
      margin: 0 4px;
      align-self: flex-end;
      margin-bottom: 2px;
      flex-shrink: 0;
    }

    /* ── Typing Indicator ── */
    .typing-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 14px 18px;
      background: var(--bg-bot-msg);
      border: 1px solid var(--border);
      border-radius: 18px;
      border-bottom-left-radius: 4px;
      width: fit-content;
      margin-left: 40px;
      animation: msg-in 0.25s ease;
    }

    .typing-indicator span {
      width: 7px;
      height: 7px;
      background: var(--accent-2);
      border-radius: 50%;
      display: inline-block;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .typing-indicator span:nth-child(1) { animation-delay: 0s; }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30%            { transform: translateY(-7px); opacity: 1; }
    }

    /* ═══════════════════════════════════════════════════════════
       QUICK ACTION BUTTONS
    ═══════════════════════════════════════════════════════════ */
    .quick-actions {
      display: flex;
      gap: 8px;
      padding: 10px 20px;
      overflow-x: auto;
      flex-shrink: 0;
      border-top: 1px solid var(--border);
    }

    .quick-actions::-webkit-scrollbar { display: none; }

    .quick-btn {
      flex-shrink: 0;
      padding: 8px 16px;
      background: transparent;
      border: 1px solid rgba(108, 71, 255, 0.4);
      border-radius: 24px;
      color: var(--accent-2);
      font-size: 13px;
      font-family: var(--font-main);
      cursor: pointer;
      transition: all 0.25s ease;
      white-space: nowrap;
    }

    .quick-btn:hover {
      background: rgba(108, 71, 255, 0.15);
      border-color: var(--accent-1);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(108, 71, 255, 0.25);
    }

    .quick-btn:active {
      transform: translateY(0);
    }

    /* ═══════════════════════════════════════════════════════════
       INPUT AREA
    ═══════════════════════════════════════════════════════════ */
    .chat-input-area {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 20px 18px;
      background: var(--bg-sidebar);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .chat-input {
      flex: 1;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 12px 20px;
      color: var(--text-primary);
      font-family: var(--font-main);
      font-size: 14px;
      resize: none;
      min-height: 46px;
      max-height: 120px;
      line-height: 1.5;
      overflow-y: auto;
      transition: border-color 0.2s;
    }

    .chat-input:focus {
      outline: none;
      border-color: var(--accent-1);
      box-shadow: 0 0 0 3px rgba(108, 71, 255, 0.15);
    }

    .chat-input::placeholder { color: var(--text-muted); }

    .send-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.25s ease;
      box-shadow: 0 4px 14px rgba(108, 71, 255, 0.4);
    }

    .send-btn:hover {
      transform: scale(1.08) rotate(10deg);
      box-shadow: 0 6px 20px rgba(108, 71, 255, 0.55);
    }

    .send-btn:active { transform: scale(0.96); }

    .send-btn svg {
      width: 19px;
      height: 19px;
      color: #fff;
    }

    /* ═══════════════════════════════════════════════════════════
       CALC CARD
    ═══════════════════════════════════════════════════════════ */
    .calc-card {
      background: var(--bg-card);
      border: 1px solid rgba(108, 71, 255, 0.3);
      border-radius: var(--radius);
      padding: 18px 20px;
      margin: 4px 0 4px 40px;
      max-width: 72%;
      animation: msg-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 4px 20px rgba(108, 71, 255, 0.15);
    }

    .calc-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }

    .calc-icon { font-size: 20px; }

    .calc-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent-2);
    }

    .calc-rows { display: flex; flex-direction: column; gap: 8px; }

    .calc-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 13.5px;
    }

    .calc-row.highlight {
      background: rgba(34, 211, 160, 0.06);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      border-bottom: none;
      margin-top: 4px;
    }

    .calc-row.maturity-row {
      background: rgba(108, 71, 255, 0.1);
      border-radius: var(--radius-sm);
      padding: 10px 10px;
      border-bottom: none;
    }

    .calc-label { color: var(--text-secondary); }
    .calc-value { font-weight: 600; color: var(--text-primary); }
    .calc-value.green { color: var(--accent-green); }
    .calc-value.maturity-val {
      color: var(--accent-2);
      font-size: 15px;
    }

    /* Bar chart */
    .calc-bar-container { margin-top: 14px; }

    .calc-bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .calc-bar {
      height: 8px;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      background: rgba(255,255,255,0.05);
    }

    .calc-bar-principal {
      background: var(--accent-1);
      border-radius: 8px 0 0 8px;
      transition: width 1s ease;
    }

    .calc-bar-interest {
      background: var(--accent-green);
      border-radius: 0 8px 8px 0;
      transition: width 1s ease;
    }

    /* ═══════════════════════════════════════════════════════════
       BOOKING CARD
    ═══════════════════════════════════════════════════════════ */
    .booking-card {
      background: linear-gradient(135deg, #1a1f35, #1e2540);
      border: 1px solid rgba(245, 158, 11, 0.3);
      border-radius: var(--radius);
      padding: 20px;
      margin: 4px 0 4px 40px;
      max-width: 80%;
      animation: msg-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 6px 24px rgba(245, 158, 11, 0.12);
    }

    .booking-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }

    .booking-icon { font-size: 28px; flex-shrink: 0; }

    .booking-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--accent-gold);
    }

    .booking-ref {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .booking-ref strong { color: var(--text-secondary); }

    .booking-status {
      margin-left: auto;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .booking-status.confirmed {
      background: rgba(34, 211, 160, 0.15);
      color: var(--accent-green);
      border: 1px solid rgba(34, 211, 160, 0.3);
    }

    .booking-divider {
      height: 1px;
      background: rgba(245, 158, 11, 0.15);
      margin-bottom: 14px;
    }

    .booking-rows { display: flex; flex-direction: column; gap: 8px; }

    .booking-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      padding: 4px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .booking-row.highlight {
      background: rgba(34, 211, 160, 0.06);
      border-radius: var(--radius-sm);
      padding: 8px 10px;
      border-bottom: none;
    }

    .booking-row.maturity-row {
      background: rgba(245, 158, 11, 0.08);
      border-radius: var(--radius-sm);
      padding: 10px 10px;
      border-bottom: none;
    }

    .bk-label { color: var(--text-secondary); }
    .bk-value { font-weight: 600; color: var(--text-primary); }
    .bk-value.green { color: var(--accent-green); }
    .bk-value.maturity-val {
      color: var(--accent-gold);
      font-size: 15px;
    }

    .booking-note {
      margin-top: 14px;
      font-size: 11.5px;
      color: var(--text-muted);
      font-style: italic;
      border-top: 1px solid rgba(255,255,255,0.05);
      padding-top: 10px;
    }

    /* ═══════════════════════════════════════════════════════════
       LANGUAGE SELECTION SCREEN
    ═══════════════════════════════════════════════════════════ */
    .lang-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
      padding: 40px;
    }

    .lang-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 30px;
      line-height: 1.5;
    }

    .lang-buttons {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 300px;
      margin: 0 auto;
    }

    .lang-btn {
      padding: 14px 24px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-size: 16px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .lang-btn:hover {
      background: rgba(108, 71, 255, 0.15);
      border-color: var(--accent-1);
      transform: translateY(-2px);
    }
    
    .change-lang-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 11px;
      cursor: pointer;
      transition: all 0.2s ease;
      margin-left: auto;
    }
    
    .change-lang-btn:hover {
      background: rgba(108, 71, 255, 0.15);
      color: var(--text-primary);
    }

    /* ═══════════════════════════════════════════════════════════
       RESPONSIVE
    ═══════════════════════════════════════════════════════════ */
    @media (max-width: 600px) {
      #app { padding: 0; }

      .chat-container {
        border-radius: 0;
        max-width: 100%;
      }

      .message-bubble { max-width: 85%; }
      .calc-card, .booking-card { max-width: 90%; margin-left: 0; }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <!-- ES Module entry point -->
  <script type="module" src="App.js"></script>
</body>
</html>
